name: Build & Release

on:
  push:
    paths:
      - 'prono_server.cpp'
    branches:
      - main
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      date: ${{ steps.version.outputs.date }}
      msg: ${{ steps.version.outputs.msg }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libboost-all-dev

      - name: Build
        run: g++ -std=c++17 -O2 -o prono prono_server.cpp -lboost_system -lpthread

      - name: Get version
        id: version
        run: |
          COUNT=$(git log --oneline -- prono_server.cpp | wc -l)
          echo "tag=v1.0.${COUNT}" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
          echo "msg=${{ github.event.head_commit.message }}" >> $GITHUB_OUTPUT

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: prono-linux
          path: prono

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Boost via MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-boost
            mingw-w64-x86_64-gcc

- name: Build
        shell: msys2 {0}
        run: |
          g++ -std=c++17 -O2 -o prono.exe prono_server.cpp \
            -lws2_32 -lwsock32 -lpthread -static

      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: prono-windows
          path: prono.exe

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: prono-linux
          path: dist/

      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: prono-windows
          path: dist/

      - name: Generate README.md
        run: |
          TAG="${{ needs.build-linux.outputs.tag }}"
          DATE="${{ needs.build-linux.outputs.date }}"
          MSG="${{ needs.build-linux.outputs.msg }}"
          cat > dist/README.md << EOF
          # Prono Web Server ${TAG}

          > Built by [probloxworld](https://probloxworld.com)

          A lightweight, feature-rich web server with a live dashboard, virtual hosts, rate limiting, rewrites, and more.

          ---

          ## 📦 Downloads

          | Platform | File | Notes |
          |----------|------|-------|
          | 🐧 Linux (x64) | \`prono\` | Built on Ubuntu |
          | 🪟 Windows (x64) | \`prono.exe\` | Built with MSYS2 MinGW64 |

          ---

          ## 🚀 Quick Start

          ### Linux
          \`\`\`bash
          chmod +x prono
          ./prono                          # defaults: port 8080, webroot ./www, admin 8081
          ./prono 80 /var/www/html 8081    # custom port, webroot, admin port
          \`\`\`

          ### Windows
          \`\`\`cmd
          prono.exe
          prono.exe 80 C:\www 8081
          \`\`\`

          ---

          ## 🖥 Dashboard

          Once running, open your browser to:
          \`\`\`
          http://<your-ip>:<adminPort>/pronoadmin
          \`\`\`

          ---

          ## ⚙️ Features

          - 📁 Static file serving with directory listing
          - 🖥 Live admin dashboard on a separate port
          - 🔀 Virtual hosts (route hostnames to separate webroots)
          - 🔁 URL rewrite & redirect rules (regex, 301/302)
          - 🛡 Security headers (HSTS, CSP, X-Frame, XSS, XCTO)
          - 🌐 CORS configuration
          - 🚦 Per-IP rate limiting with burst allowance
          - 🔒 HTTP Basic Auth with per-path protection
          - 📋 Access logs with download & live filtering
          - 🧱 IP firewall (block/unblock per IP)
          - 🧩 Custom response headers
          - 📦 Cache-Control rules per file extension
          - ❌ Custom error pages per status code
          - 💾 Config auto-saved to \`prono.cfg\` next to the binary

          ---

          ## 🔧 Build from Source

          ### Linux
          \`\`\`bash
          sudo apt install libboost-all-dev
          g++ -std=c++17 -O2 -o prono prono_server.cpp -lboost_system -lpthread
          \`\`\`

          ### Windows (MSYS2 MinGW64)
          \`\`\`bash
          pacman -S mingw-w64-x86_64-boost mingw-w64-x86_64-gcc
          g++ -std=c++17 -O2 -o prono.exe prono_server.cpp -lboost_system -lws2_32 -lwsock32 -lpthread -static
          \`\`\`

          ---

          ## 🏃 Running as a systemd Service (Linux)

          \`\`\`ini
          [Unit]
          Description=Prono Web Server
          After=network.target

          [Service]
          ExecStart=/opt/prono/prono 8080 /var/www/html 8081
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
          \`\`\`

          \`\`\`bash
          sudo systemctl enable --now prono
          \`\`\`

          ---

          ## 📝 Release Info

          | | |
          |---|---|
          | **Version** | ${TAG} |
          | **Built** | ${DATE} |
          | **Commit** | ${{ github.sha }} |
          | **Change** | ${MSG} |
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build-linux.outputs.tag }}
          name: "Prono ${{ needs.build-linux.outputs.tag }} (${{ needs.build-linux.outputs.date }})"
          body: |
            Automated build triggered by update to `prono_server.cpp`.
            **Change:** ${{ needs.build-linux.outputs.msg }}
            **Commit:** ${{ github.sha }}
          files: |
            dist/prono
            dist/prono.exe
            dist/README.md
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
